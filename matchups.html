<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matchups · 2026 DK NFL League - II</title>


  <style>
    :root {
      --bg:          #030d06;
      --surface:     #071a0d;
      --surface2:    #0c2414;
      --border:      #143d1c;
      --border2:     #1c5228;
      --accent:      #ffffff;
      --accent2:     #d0d8d4;
      --green:       #2ecc71;
      --red:         #e74c3c;
      --muted:       #5e7068;
      --text:        #ffffff;
      --text-dim:    #9ab0a4;
      --heading:     #ffffff;
      --radius:      4px;
      --font-ui:     'Calibri', 'Candara', sans-serif;
      --font-mono:   'Calibri', 'Candara', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }

    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 16px;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .04em;
      color: var(--heading);
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }
    nav { display: flex; gap: 4px; flex-wrap: nowrap; }
    @media (max-width: 480px) {
      .logo { font-size: 15px; }
      nav a { font-size: 12px; padding: 6px 7px; }
    }
    nav a {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: var(--radius);
      transition: color .15s, background .15s;
    }
    nav a:hover, nav a:focus {
      color: var(--accent);
      background: rgba(255,255,255,.10);
      text-decoration: none;
    }
    nav a.active {
      color: var(--accent);
      background: rgba(255,255,255,.15);
    }

    .hero {
      background: linear-gradient(135deg, #020a04 0%, #061510 55%, #0a2210 100%);
      border-bottom: 1px solid var(--border);
      padding: 40px 16px 32px;
      text-align: center;
    }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: .03em;
      color: var(--heading);
      line-height: 1.1;
    }
    .hero h1 span { color: var(--accent); }

    .section { padding: 40px 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--accent);
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      margin-bottom: 24px;
    }
    h2.block-heading {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 900;
      color: var(--heading);
      letter-spacing: .02em;
      margin-bottom: 20px;
    }

    .matchups-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .matchups-controls select {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      padding: 7px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      outline: none;
    }
    .matchups-controls select:focus { border-color: var(--accent); }
    .btn-refresh {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 7px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-refresh:hover { background: var(--accent); color: #000; }

    /* Matchups table box */
    .matchups-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .matchups-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }
    .matchups-table thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--accent);
    }
    .matchups-table th {
      padding: 11px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }
    .matchups-table th.col-home,
    .matchups-table th.col-away { text-align: left; }
    .matchups-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .matchups-table tr:last-child td { border-bottom: none; }
    .matchups-table tr:hover td { background: rgba(255,255,255,.025); }

    .td-game {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
      width: 60px;
    }
    .td-team {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    /* Desktop — all inline */
    .td-team .record,
    .td-team .dk-user,
    .td-team .team-abbr {
      display: inline;
      line-height: 1.4;
    }
    .td-team .dk-user {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      margin: 0 3px;
    }
    .td-team .team-abbr {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .td-score {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      color: var(--heading);
      white-space: nowrap;
      width: 110px;
    }
    .td-score .vs-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .td-score .score-sep { color: var(--muted); margin: 0 4px; font-weight: 400; }
    .td-home {
      text-align: right;
    }
    .record {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    #matchups-empty {
      font-size: 13px;
      color: var(--muted);
      padding: 24px 16px;
    }

    /* ---- Expandable lineup rows ---- */
    .matchup-row {
      cursor: pointer;
      user-select: none;
    }
    .matchup-row:hover td { background: rgba(255,255,255,.035); }
    .chevron {
      display: inline-block;
      font-size: 11px;
      color: var(--muted);
      margin-left: 6px;
      transition: transform .2s ease;
      vertical-align: middle;
    }
    .matchup-row.open .chevron { transform: rotate(180deg); }

    .lineup-detail-row { display: none; }
    .lineup-detail-row.open { display: table-row; }
    .lineup-detail-row td { padding: 0; border-bottom: 2px solid var(--accent); }

    .lineup-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface2);
      border-top: 1px solid var(--border2);
    }
    .lineup-side {
      padding: 14px 16px;
    }
    .lineup-side:first-child {
      border-right: 1px solid var(--border2);
    }
    .lineup-side-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .lineup-player {
      display: flex;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      gap: 6px;
    }
    .lineup-player:last-of-type { border-bottom: none; }
    .lp-pos {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--muted);
      width: 34px;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .lp-name {
      flex: 1;
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .lp-pts {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      flex-shrink: 0;
      min-width: 36px;
      text-align: right;
    }
    .lp-pts.zero { color: var(--muted); }
    .lineup-total {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border2);
      font-size: 12px;
      font-weight: 700;
      color: var(--heading);
    }
    .lineup-total .tot-pts { color: var(--green); font-size: 13px; }

    @media (max-width: 600px) {
      .matchups-box { max-width: 100% !important; }
      .matchups-table th { padding: 8px 6px; font-size: 10px; }
      .matchups-table td { padding: 10px 6px; }
      .td-score { font-size: 13px; width: 75px; }
      /* Stack on mobile */
      .td-team .record,
      .td-team .dk-user,
      .td-team .team-abbr {
        display: block;
        margin: 0;
      }
      .td-team .record    { font-size: 10px; }
      .td-team .dk-user   { font-size: 10px; }
      .td-team .team-abbr { font-size: 13px; }
      /* Reorder away cell on mobile: record → dk → abbr */
      .td-away { display: flex; flex-direction: column; }
      .td-away .team-abbr { order: 3; }
      .td-away .dk-user   { order: 2; }
      .td-away .record    { order: 1; }
      /* Stack lineup panel on mobile */
      .lineup-panel { grid-template-columns: 1fr; }
      .lineup-side:first-child { border-right: none; border-bottom: 1px solid var(--border2); }
      .lp-name { font-size: 11px; }
    }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--green);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 12px 18px;
      border-radius: var(--radius);
      z-index: 300;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      max-width: 320px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    footer {
      border-top: 1px solid var(--border);
      padding: 20px 16px;
      text-align: center;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }
  
    /* ── Claim button & Available badge — gold ── */
    .btn-claim { background: #e8a020 !important; color: #000 !important; }
    .btn-claim:hover { background: #c47010 !important; }
    .btn-claim:disabled { background: #5a5a5a !important; color: #aaa !important; }
    .badge-available { background: rgba(46,204,113,.12) !important; color: #2ecc71 !important; border-color: rgba(46,204,113,.25) !important; }

    /* ── DK username — yellow ── */
    .td-team .dk-user { color: #e8a020 !important; }

    /* ── AFC = red, NFC = blue ── */
    .conf-grid .conf-card:first-child .conf-header { color: #f05050; border-bottom-color: #f05050; }
    .conf-grid .conf-card:first-child .conf-header small { color: rgba(240,80,80,.65); }
    .conf-grid .conf-card:first-child .division-name { color: #c05060; }
    .conf-grid .conf-card:last-child .conf-header { color: #60a5fa; border-bottom-color: #60a5fa; }
    .conf-grid .conf-card:last-child .conf-header small { color: rgba(96,165,250,.65); }
    .conf-grid .conf-card:last-child .division-name { color: #4a90d8; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html" style="text-decoration:none">2026 <span>NFL</span> League — II</a>
    <nav>
      <a href="standings.html">Standings</a>
      <a href="matchups.html" class="active">Matchups</a>
    </nav>
  </div>
</header>

<section class="hero">
  <h1>Weekly <span>Matchups</span></h1>
</section>

<section class="section container" id="matchups">
  <p class="section-title">Schedule</p>
  <h2 class="block-heading">Weekly Matchups</h2>

  <div class="matchups-controls">
    <select id="matchups-week-filter" onchange="renderMatchups()">
      <option value="">Loading…</option>
    </select>
  </div>

  <div class="matchups-box" style="max-width:780px;margin:0 auto">
    <table class="matchups-table" id="matchups-table">
      <thead>
        <tr>
          <th class="col-away">Away</th>
          <th class="col-score">Score</th>
          <th class="col-home" style="text-align:right">Home</th>
        </tr>
      </thead>
      <tbody id="matchups-tbody">
        <tr><td colspan="5" id="matchups-empty" class="td-game" style="width:auto;text-align:left;color:var(--muted);font-size:13px">No matchups found for this week.</td></tr>
      </tbody>
    </table>
  </div>
</section>

<footer>
  <p>2026 DK NFL League - II · <a href="index.html">Home</a></p>
</footer>

<div id="toast" role="status" aria-live="polite"></div>

  // ── Runtime state ──────────────────────────────────────────────
  let claimedTeams = {};

  function allTeamsClaimed() {
    return Object.keys(claimedTeams).length >= MOCK_LEAGUE.teams.length;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
  }

  // ── Data loading ───────────────────────────────────────────────
  async function loadClaims() {
    if (!isLive()) {
      try {
        const raw = localStorage.getItem('gfl2_claimed');
        claimedTeams = raw ? JSON.parse(raw) : {};
        const rawU = localStorage.getItem('gfl2_usernames');
        window._claimUsernames = rawU ? JSON.parse(rawU) : {};
      } catch (e) {}
      return;
    }
    try {
      const res  = await fetch(GOOGLE_SHEETS_CONFIG.APPS_SCRIPT_URL + '?action=claims');
      const data = await res.json();
      if (data.success) {
        claimedTeams           = data.claims    || {};
        window._claimUsernames = data.usernames || {};
      }
    } catch (err) {
      console.warn('loadClaims failed', err);
    }
  }

  async function loadStandings() {
    if (!isLive()) return MOCK_STANDINGS;
    try {
      const res  = await fetch(GOOGLE_SHEETS_CONFIG.APPS_SCRIPT_URL + '?action=standings');
      const data = await res.json();
      return (data.success && data.standings && data.standings.length > 0) ? data.standings : MOCK_STANDINGS;
    } catch (err) {
      console.warn('loadStandings failed, using mock data', err);
      return MOCK_STANDINGS;
    }
  }

  function getRecordForTeam(teamName) {
    const team = MOCK_LEAGUE.teams.find(t => t.name === teamName);
    if (!team) return '';
    const s = standings.find(x => x.teamId === team.id);
    if (!s) return '';
    return `(${s.wins}-${s.losses})`;
  }

  async function loadMatchups() {
    if (!isLive()) return [];
    try {
      const res  = await fetch(GOOGLE_SHEETS_CONFIG.APPS_SCRIPT_URL + '?action=matchups');
      const data = await res.json();
      return (data.success && data.matchups) ? data.matchups : [];
    } catch (err) {
      console.warn('loadMatchups failed', err);
      return [];
    }
  }

  // ── Render ─────────────────────────────────────────────────────
  function getPlayerForTeam(teamName) {
    if (!allTeamsClaimed()) return null;
    const team = MOCK_LEAGUE.teams.find(t => t.name === teamName);
    if (!team) return null;
    // Return DraftKings username — only visible once all 32 teams are claimed
    return (window._claimUsernames && window._claimUsernames[team.id]) || null;
  }

  function populateWeekFilter(keepWeek) {
    const weeks = [...new Set(window._matchups.map(m => Number(m.week)))].sort((a, b) => a - b);
    const sel   = document.getElementById('matchups-week-filter');
    sel.innerHTML = '';

    if (weeks.length === 0) {
      sel.innerHTML = '<option value="">No matchups yet</option>';
      return;
    }

    weeks.forEach(w => {
      const opt       = document.createElement('option');
      opt.value       = w;
      opt.textContent = 'Week ' + w;
      sel.appendChild(opt);
    });

    sel.value = (keepWeek && weeks.includes(Number(keepWeek))) ? keepWeek : weeks[weeks.length - 1];
  }

  function buildLineupSideHTML(teamName, isHome) {
    const team    = MOCK_LEAGUE.teams.find(t => t.name === teamName);
    const teamId  = team ? team.id : null;
    const lineup  = teamId ? window._lineups[teamId] : null;
    const abbr    = TEAM_ABBR[teamName] || teamName;
    const dk      = allTeamsClaimed() ? getPlayerForTeam(teamName) : null;

    const headerLabel = dk
      ? `${escHtml(dk)} · ${abbr}`
      : abbr;

    if (!lineup || !lineup.players || lineup.players.length === 0) {
      return `<div class="lineup-side">
        <div class="lineup-side-header">${headerLabel}</div>
        <div style="font-size:12px;color:var(--muted);padding:8px 0">Lineup not yet available</div>
      </div>`;
    }

    const playersHTML = lineup.players.map(p => {
      const hasPoints = p.pts > 0;
      return `<div class="lineup-player">
        <span class="lp-pos">${escHtml(p.pos)}</span>
        <span class="lp-name">${escHtml(p.name)}</span>
        <span class="lp-pts${hasPoints ? '' : ' zero'}">${p.pts > 0 ? p.pts.toFixed(2) : '—'}</span>
      </div>`;
    }).join('');

    const total = lineup.totalPoints || 0;

    return `<div class="lineup-side">
      <div class="lineup-side-header">${headerLabel}</div>
      ${playersHTML}
      <div class="lineup-total">
        <span>Total</span>
        <span class="tot-pts">${total > 0 ? total.toFixed(2) : '—'}</span>
      </div>
    </div>`;
  }

  function toggleLineup(idx) {
    const matchRow   = document.getElementById('matchup-row-' + idx);
    const detailRow  = document.getElementById('lineup-row-' + idx);
    if (!matchRow || !detailRow) return;
    const isOpen = detailRow.classList.contains('open');
    detailRow.classList.toggle('open', !isOpen);
    matchRow.classList.toggle('open', !isOpen);
  }

  function renderMatchups() {
    const sel     = document.getElementById('matchups-week-filter');
    const selWeek = Number(sel.value);
    const tbody   = document.getElementById('matchups-tbody');
    const week    = window._matchups.filter(m => Number(m.week) === selWeek);

    tbody.innerHTML = '';

    if (week.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="padding:24px 16px;color:var(--muted);font-size:13px">No matchups found for this week.</td></tr>';
      return;
    }

    week.forEach((m, i) => {
      const played   = m.homeScore !== null && m.awayScore !== null;
      const homeWins = played && m.homeScore > m.awayScore;
      const awayWins = played && m.awayScore > m.homeScore;

      const homeAbbr = TEAM_ABBR[m.homeTeam] || m.homeTeam;
      const awayAbbr = TEAM_ABBR[m.awayTeam] || m.awayTeam;
      const homeDK   = getPlayerForTeam(m.homeTeam);
      const awayDK   = getPlayerForTeam(m.awayTeam);

      const homeRecord = getRecordForTeam(m.homeTeam);
      const awayRecord = getRecordForTeam(m.awayTeam);

      const awayLabel = `<span class="team-abbr">${awayAbbr}</span><span class="dk-user">${awayDK ? escHtml(awayDK) : ''}</span><span class="record">${awayRecord}</span>`;
      const homeLabel = `<span class="record">${homeRecord}</span><span class="dk-user">${homeDK ? escHtml(homeDK) : ''}</span><span class="team-abbr">${homeAbbr}</span>`;

      const scoreCell = played
        ? `<span style="color:${awayWins ? 'var(--green)' : 'var(--muted)'}">${m.awayScore}</span><span class="score-sep">–</span><span style="color:${homeWins ? 'var(--green)' : 'var(--muted)'}">${m.homeScore}</span><span class="chevron">▾</span>`
        : `<span class="vs-label">VS</span><span class="chevron">▾</span>`;

      // Main matchup row
      const tr = document.createElement('tr');
      tr.className = 'matchup-row';
      tr.id = 'matchup-row-' + i;
      tr.setAttribute('onclick', 'toggleLineup(' + i + ')');
      tr.innerHTML = `
        <td class="td-team td-away">${awayLabel}</td>
        <td class="td-score">${scoreCell}</td>
        <td class="td-team td-home">${homeLabel}</td>
      `;
      tbody.appendChild(tr);

      // Expandable lineup detail row
      const detailTr = document.createElement('tr');
      detailTr.className = 'lineup-detail-row';
      detailTr.id = 'lineup-row-' + i;
      detailTr.innerHTML = `
        <td colspan="3">
          <div class="lineup-panel">
            ${buildLineupSideHTML(m.awayTeam, false)}
            ${buildLineupSideHTML(m.homeTeam, true)}
          </div>
        </td>
      `;
      tbody.appendChild(detailTr);
    });
  }

  async function refreshMatchups() {
    const prevWeek = document.getElementById('matchups-week-filter').value;
    await loadClaims();
    standings = await loadStandings();
    window._matchups = await loadMatchups();
    populateWeekFilter(prevWeek);
    renderMatchups();
  }

  async function loadLineups(week) {
    if (!isLive()) return;
    try {
      const res  = await fetch(GOOGLE_SHEETS_CONFIG.APPS_SCRIPT_URL + '?action=lineups&week=' + week);
      const data = await res.json();
      if (data.success && data.lineups) window._lineups = data.lineups;
    } catch (err) {
      console.warn('loadLineups failed', err);
    }
  }

  // ── Boot ───────────────────────────────────────────────────────
  async function boot() {
    await loadClaims();
    standings = await loadStandings();
    window._matchups = await loadMatchups();

    // ── MOCK OVERRIDE (remove after testing) ──
    window._claimUsernames = MOCK_USERNAMES;
    MOCK_LEAGUE.teams.forEach(t => { claimedTeams[t.id] = 'MockPlayer'; });
    window._matchups = MOCK_MATCHUP_DATA;
    standings = MOCK_STANDINGS;
    window._lineups = MOCK_LINEUPS;
    // ──────────────────────────────────────────

    populateWeekFilter();
    renderMatchups();
  }

  boot();
